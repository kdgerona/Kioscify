# ================================
# Kioscify — Local Development Nginx Config
# ================================
#
# All app services run on host via npm run *:dev (not in Docker).
# Nginx proxies to host.docker.internal so the browser always hits
# a single domain, eliminating CORS entirely.
#
# Port map (host services):
#   API (NestJS):        host:4000  →  *.kioscify.localhost/api/
#   Store Portal:        host:3100  →  kioscify.localhost
#   Company Portal:      host:3001  →  <slug>.kioscify.localhost
#   Platform Admin:      host:3002  →  platform.kioscify.localhost
#
# NEXT_PUBLIC_API_URL per portal — see .env.local.example files.

# ─── Upstreams ────────────────────────────────────────────────────────────────

upstream kioscify_api {
    server host.docker.internal:4000;
    keepalive 16;
}

upstream kioscify_store {
    server host.docker.internal:3100;
    keepalive 8;
}

upstream kioscify_company {
    server host.docker.internal:3001;
    keepalive 8;
}

upstream kioscify_platform {
    server host.docker.internal:3002;
    keepalive 8;
}

# ─── Platform Admin — platform.kioscify.localhost ─────────────────────────────

server {
    listen 80;
    server_name platform.kioscify.localhost;
    client_max_body_size 50M;

    # API — same-origin proxy, no CORS
    location /api/ {
        proxy_pass         http://kioscify_api;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   Connection         "";
    }

    location /uploads/ {
        proxy_pass http://kioscify_api;
    }

    location = /health {
        proxy_pass  http://kioscify_api;
        access_log  off;
    }

    # Next.js HMR websocket
    location /_next/webpack-hmr {
        proxy_pass         http://kioscify_platform;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    location / {
        proxy_pass         http://kioscify_platform;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
    }
}

# ─── Store Portal — kioscify.localhost + store.kioscify.localhost ─────────────

server {
    listen 80;
    server_name kioscify.localhost store.kioscify.localhost;
    client_max_body_size 50M;

    # API — same-origin proxy, no CORS
    location /api/ {
        proxy_pass         http://kioscify_api;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   Connection         "";
    }

    location /uploads/ {
        proxy_pass http://kioscify_api;
    }

    location = /health {
        proxy_pass  http://kioscify_api;
        access_log  off;
    }

    # Next.js HMR websocket
    location /_next/webpack-hmr {
        proxy_pass         http://kioscify_store;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    location / {
        proxy_pass         http://kioscify_store;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
    }
}

# ─── Store Portal — <company>.store.kioscify.localhost ────────────────────────
# MUST come before the wildcard company block.

server {
    listen 80;
    server_name ~^(?<company_sub>.+)\.store\.kioscify\.localhost$;
    client_max_body_size 50M;

    location /api/ {
        proxy_pass         http://kioscify_api;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   Connection         "";
    }

    location /uploads/ {
        proxy_pass http://kioscify_api;
        proxy_hide_header Cross-Origin-Resource-Policy;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
    }

    location = /health {
        proxy_pass  http://kioscify_api;
        access_log  off;
    }

    location /_next/webpack-hmr {
        proxy_pass         http://kioscify_store;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    location / {
        proxy_pass         http://kioscify_store;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
    }
}

# ─── Company Portal — *.kioscify.localhost ────────────────────────────────────
# Catches all other subdomains. Next.js middleware validates the company slug.

server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.kioscify\.localhost$;
    client_max_body_size 50M;

    # API — same-origin proxy, no CORS
    location /api/ {
        proxy_pass         http://kioscify_api;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   Connection         "";
    }

    location /uploads/ {
        proxy_pass http://kioscify_api;
    }

    location = /health {
        proxy_pass  http://kioscify_api;
        access_log  off;
    }

    # Next.js HMR websocket
    location /_next/webpack-hmr {
        proxy_pass         http://kioscify_company;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    location / {
        proxy_pass         http://kioscify_company;
        proxy_http_version 1.1;
        # Pass full Host so Next.js middleware can extract the company subdomain
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
    }
}
