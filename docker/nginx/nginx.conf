# ================================
# Kioscify — Nginx Configuration
# ================================
#
# Domain structure:
#   kioscify.kdgerona.com           → Store Portal (kioscify-store)
#   store.kioscify.kdgerona.com     → Store Portal (alias)
#   platform.kioscify.kdgerona.com  → Platform Admin (kioscify-platform)
#   *.kioscify.kdgerona.com         → Company + Brand Portal (kioscify-company)
#                                     (middleware validates company slug)
#
# SSL: requires wildcard cert for *.kioscify.kdgerona.com + kioscify.kdgerona.com
# Generate with: certbot certonly --dns-<provider> -d kioscify.kdgerona.com -d *.kioscify.kdgerona.com

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/rss+xml image/svg+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;   # strict for auth
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

    # Upstream servers
    upstream api_backend {
        server api:3000;
        keepalive 32;
    }

    upstream store_frontend {
        server store:3000;        # kioscify-store (was kioskly-admin)
        keepalive 16;
    }

    upstream company_frontend {
        server company:3001;      # kioscify-company
        keepalive 16;
    }

    upstream platform_frontend {
        server platform:3002;     # kioscify-platform
        keepalive 16;
    }

    # ─── HTTP → HTTPS redirect (all domains) ─────────────────────────────────
    server {
        listen 80;
        server_name kioscify.kdgerona.com *.kioscify.kdgerona.com;
        return 301 https://$host$request_uri;
    }

    # ─── Platform Admin (platform.kioscify.kdgerona.com) ─────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name platform.kioscify.kdgerona.com;

        ssl_certificate     /etc/nginx/ssl/live/kioscify.kdgerona.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/kioscify.kdgerona.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        client_max_body_size 10M;

        location / {
            proxy_pass http://platform_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /_next/static {
            proxy_pass http://platform_frontend;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── Store Portal (root domain + store.* alias) ───────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name kioscify.kdgerona.com store.kioscify.kdgerona.com;

        ssl_certificate     /etc/nginx/ssl/live/kioscify.kdgerona.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/kioscify.kdgerona.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        client_max_body_size 50M;

        # API
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Strict rate limit on auth endpoints
        location ~ ^/api/v1/auth/(login|company-login|platform-login) {
            limit_req zone=login_limit burst=10 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Uploads (static files — served cross-origin for company/brand portals)
        location /uploads/ {
            proxy_pass http://api_backend;
            proxy_cache_valid 200 1d;
            expires 1d;
            add_header Cache-Control "public, immutable";
            # Helmet sets same-origin by default; override so subdomains can load logos
            proxy_hide_header Cross-Origin-Resource-Policy;
            add_header Cross-Origin-Resource-Policy "cross-origin" always;
        }

        # Health check (no auth, no rate limit)
        location = /health {
            proxy_pass http://api_backend;
            access_log off;
        }

        # Store Portal frontend
        location / {
            proxy_pass http://store_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /_next/static {
            proxy_pass http://store_frontend;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── Company + Brand Portal (wildcard subdomains) ─────────────────────────
    # IMPORTANT: This catches ALL other subdomains (e.g., greatserve.kioscify.kdgerona.com).
    # The Next.js middleware in kioscify-company validates the subdomain against the DB.
    server {
        listen 443 ssl;
        http2 on;
        server_name ~^(?<subdomain>.+)\.kioscify\.kdgerona\.com$;

        ssl_certificate     /etc/nginx/ssl/live/kioscify.kdgerona.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/kioscify.kdgerona.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        client_max_body_size 50M;

        # Pass subdomain to Next.js for validation
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            proxy_pass http://company_frontend;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location /_next/static {
            proxy_pass http://company_frontend;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        location = /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }
    }
}
